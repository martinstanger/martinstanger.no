<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>martinstanger</title>
    <style>
        body {
            margin: 0;
            background-color: mediumblue;
            color: black;
            font-family: "Comic Sans MS", cursive, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            max-width: 960px; /* Maksimal bredde på hele siden */
            margin: 0 auto; /* Sentraliserer innholdet horisontalt */
            padding: 0 20px; /* Litt padding på venstre og høyre side */
        }

        header {
            background-color: darkblue;
            color: red;
            border: 5px solid black;
            text-align: center;
            padding: 30px;
            margin-top: 30px;
        }

        main {
            display: flex;
            flex: 1;
            background-color: transparent;
            gap: 100px;
        }

        .content {
            display: flex;
            flex-direction: column;
            flex: 2;
            gap: 20px;
            padding: 20px;
            border: 5px solid black;
            background-color: darkblue;
        }

        .content > div {
            flex: 1;
            display: flex;
            justify-content: right;
            align-items: center;
            padding: 20px;
            border: 5px solid black;
            background-color: blue;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 20px;
            padding: 20px;
            border: 5px solid black;
            background-color: darkblue;
        }

        .sidebar > div {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: right;
            align-items: left;
            padding: 20px;
            border: 5px solid black;
            background-color: blue;
        }

        .image-box {
            width: 100%; /* Tar opp hele bredden av containeren */
            max-width: 960px; /* Maksimal bredde på 960px */
            height: 40px; /* Setter høyden på banneret */
            background-image: url('gifs/liggendeshootingstars.gif');
            background-size: 110%; /* Beholder original størrelse på bildet */
            background-repeat: repeat-x; /* Gjentar bildet horisontalt */
            background-position: center; /* Plasserer bildet på toppen og sentrert horisontalt */
            border: 5px solid transparent; /* 5px border rundt bildet */
            margin-top: 25px; /* Avstand over bildet */
            margin-bottom: 25px; /* Avstand under bildet */
            box-sizing: border-box; /* Inkluderer borderen i beregningen av bredde og høyde */
        }


        .email-box, .instagram-link {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 20px;
            border: 3px solid black;
            background-color: darkblue;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0px 0px 10px black;
            transition: all 0.3s ease;
        }

        .email-box:hover, .instagram-link:hover {
            background-color: mediumblue;
            color: red;
            box-shadow: 0px 0px 15px red;
            transform: scale(1.1);
        }
 
        .instagram-link {
            color: white;
            font-size: 16px;
            border: 2px solid black;
            margin-top: 70px;
            display: inline-flex; /* Bruker inline-flex for å tillate flexbox-styling på lenken */
            align-items: center; /* Sentraliserer ikonet vertikalt med teksten */
            justify-content: center; /* Sentraliserer innholdet horisontalt */
            background-color: darkblue;
            margin-top: 0px; /* Litt avstand over lenken */
        }

        figure {
            margin: 0px; /* Fjerner standard margin rundt figure */
            padding: 0px; /* Fjerner standard padding */
            text-align: center; /* Sentrerer bildet og bildetekst */
        }

        /* Generell stil for alle bilder */
        img {
            display: block; /* Sørger for at bildet ikke påvirker teksten ved å gjøre det til et blokkelement */
            margin: 0 auto; /* Sentrerer bildet horisontalt */
            max-width: 100%; /* Sørger for at bildet ikke blir større enn sin container */
            height: auto; /* Bevarer bildets proporsjoner */
        }

        /* Spesifikk stil for bilder i .image-box */
        .image-box img {
            max-width: 100%; /* Garanterer at disse bildene kan være fullt responsive */
            height: auto; /* Sørger for at disse bildene beholder proporsjonene sine */
        }

        h4 {
            position: relative;
            text-align: center; /* Sentraliserer teksten som standard */
            margin: 1;
        }
        
        footer {
            background-color: darkblue;
            color: red;
            text-align: center;
            padding: 10px 0;
            margin-top: 20px;
            border: 5px solid black;
        }
    </style>
</head>

<!-- CSS SLUTT:3 -->
    
<body>

<header>
    <h1>hvem her vil ha meg</h1>
</header>
    
<!-- Øverst i content, Hjertepattern1.gif -->
<div class="image-box"></div>
    
<main>
    <div class="content">
        <!-- Øvre del av .content -->
        <div>
            <p>jeg hakke så mye på hjertet men send meg en mail så kanskje</p>
        </div>
        
        <!-- Nedre del av .content -->
        <div>
            <a href="mailto:post@martinstanger.no" class="email-box">post@martinstanger.no</a>
        </div>
    </div>

    <aside class="sidebar">
        <!-- Øverste del av .sidebar -->
        <div>
        <img src="gifs/onlinenow.gif" alt="online now" />
            <h1>bidle</h1>
            <h2>bilde</h2>
        </div>

        <!-- Midtre del av .sidebar -->
    <div>
     <h4>følg meg på insta????</h4>
            <a class="instagram-link" href="https://www.instagram.com/martinstanger/" target="_blank">
                @martinstanger
            </a>
        </div>

        <!-- Nederste del av .sidebar -->
        <div>
                <h2>knurreknurt</h2>
            <figure>
    <img src="gifs/minimusikksmiley2.gif" alt="Minimusikk Smiley" />
            </figure>
        </div>
    </aside>
</main>

<footer>
    <p>© 2024 - Bergen, Norge</p>
</footer>

</body>
</html>
