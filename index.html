<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>martinstanger.no</title>
    <style>
        body {
            margin: 10px;
            background-color: black;
            color: lime;
            font-family: "Comic Sans MS", cursive, sans-serif;
            text-align: center;
            width: 60%; /* Smalere kropp */
            margin: 0 auto; /* Sentraliserer innholdet */
            display: flex; /* Flexbox layout */
        }
        a {
            color: cyan;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
            color: yellow;
        }
        .blink {
            animation: blink 1s steps(2, start) infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .content {
            margin: 50px auto;
            width: 200%; /* Reduced width for content box */
            border: 2px dashed lime;
            padding: 20px;
        }
        /* Box with hjertepattern1.gif background */
        .image-box {
	    align: center;
    	    width: 200%; /* Set width */
	    height: 10%; /* Set height */
	    margin: 10px;
	    background-image: url('gifs/hjertepattern1.gif'); /* Background image */
	    background-size: 50%; /* Scale the image to 50% of its original size */
	    background-repeat: repeat; /* Repeat the image to fill the box */
    	    background-position: top left; /* Align pattern from the top left */
    	    border: 2px dashed lime; /* Optional border */
    	    padding: 20px; /* Optional padding */
        }
        /* Old-school e-postboks */
        .email-box {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 20px;
            border: 3px solid red; /* Rød farge */
            background-color: black;
            color: red; /* Rød farge */
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0px 0px 5px red; /* Rød skygge */
            transition: all 0.3s ease;
        }
        .email-box:hover {
            background-color: red; /* Rød bakgrunn på hover */
            color: black; /* Svart tekst på hover */
            transform: scale(1.1);
            box-shadow: 0px 0px 15px yellow;
        }
        .instagram-link {
            color: red; /* Rød farge */
            font-size: 16px;
            text-decoration: none;
            border: 2px dashed red; /* Rød kant */
            padding: 5px 10px;
            margin-top: 20px;
            display: inline-block;
            background-color: black;
            transition: all 0.3s ease;
            box-shadow: 0px 0px 10px rgba(255, 0, 0, 0.8); /* Rød skygge */
        }
        .instagram-link:hover {
            color: black; /* Svart tekst på hover */
            background-color: red; /* Rød bakgrunn på hover */
            box-shadow: 0px 0px 20px rgba(255, 0, 0, 1); /* Rød skygge på hover */
            transform: scale(1.1);
        }
        .instagram-icon {
            width: 20px;
            height: 20px;
            vertical-align: middle;
            margin-right: 5px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        footer {
            margin: 0 auto;
            text-align: bottom;
	}
    </style>
</head>

<body>
    <div class="image-box">
    </div>
    <div class="content">
        <p>jeg hakke så mye på hjertet men send meg mail så skal du se</p>

        <p><a href="mailto:post@martinstanger.no" class="email-box">post@martinstanger.no</a></p>

        <p class="blink">følg meg på insta?????</p>

        <a class="instagram-link" href="https://www.instagram.com/martinstanger/" target="_blank">
            <img class="instagram-icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/Instagram_logo_2022.svg/800px-Instagram_logo_2022.svg.png" alt="Instagram logo"> 
            @martinstanger
        </a>

    </div>
    
<footer>
        <p style="font-size: 12px;">© 2024 - Bergen, Norge</p>
</footer>
</body>
</html>
